services:
  - type: web
    name: life-sciences-intel-api
    runtime: python
    rootDir: backend
    plan: starter
    autoDeploy: true
    buildCommand: pip install -e . && python -m playwright install chromium
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: DATABASE_URL
        fromDatabase:
          name: life-sciences-intel-db
          property: connectionString
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: MARKET_DATA_PROVIDER
        value: fmp
      - key: OBJECT_STORE_REGION
        value: auto
      - key: ENABLE_SCHEDULER
        value: "true"
      - key: ENABLE_BROWSER_PDF_RENDERING
        value: "true"
      - key: MAX_FILING_SUMMARIES_PER_DAY
        value: "12"
      - key: MAX_NEWS_SUMMARIES_PER_DAY
        value: "24"
      - key: MAX_FILING_SUMMARIES_PER_RUN
        value: "3"
      - key: MAX_NEWS_SUMMARIES_PER_RUN
        value: "8"
      - key: FILING_SUMMARY_BACKLOG_DAYS
        value: "14"
      - key: NEWS_SUMMARY_BACKLOG_DAYS
        value: "3"
      - key: SEC_USER_AGENT
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FMP_API_KEY
        sync: false
      - key: FMP_BASE_URL
        value: https://financialmodelingprep.com/stable
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: OBJECT_STORE_ENDPOINT_URL
        sync: false
      - key: OBJECT_STORE_ACCESS_KEY_ID
        sync: false
      - key: OBJECT_STORE_SECRET_ACCESS_KEY
        sync: false
      - key: OBJECT_STORE_BUCKET
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_API_TOKEN
        sync: false

databases:
  - name: life-sciences-intel-db
    plan: basic-256mb
    databaseName: life_sciences_info
    postgresMajorVersion: "16"
