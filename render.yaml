services:
  - type: web
    name: life-sciences-intel-api
    runtime: python
    rootDir: backend
    plan: starter
    autoDeploy: true
    buildCommand: pip install -e . && python -m playwright install chromium
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: DATABASE_URL
        fromDatabase:
          name: life-sciences-intel-db
          property: connectionString
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_MODEL_SUMMARY_SHORT
        value: gpt-5.4-mini
      - key: OPENAI_MODEL_SUMMARY_FULL
        value: gpt-5.4
      - key: OPENAI_MODEL_DIFF
        value: gpt-5.4
      - key: OPENAI_MODEL_DIGEST
        value: gpt-5.4
      - key: OPENAI_MODEL_MANUAL
        value: gpt-5.4
      - key: MARKET_DATA_PROVIDER
        value: fmp
      - key: CLINICAL_TRIALS_PROVIDER
        value: aact_cloud
      - key: CLINICAL_TRIALS_RECENT_DAYS
        value: "730"
      - key: OBJECT_STORE_REGION
        value: auto
      - key: ENABLE_SCHEDULER
        value: "true"
      - key: ENABLE_BROWSER_PDF_RENDERING
        value: "true"
      - key: DIGEST_EMAIL_ENABLED
        value: "false"
      - key: DIGEST_EMAIL_TO
        value: chris.hayduk1@gmail.com
      - key: DIGEST_EMAIL_FROM
        value: chris.hayduk1@gmail.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        value: chris.hayduk1@gmail.com
      - key: SMTP_USE_STARTTLS
        value: "true"
      - key: DAILY_AI_BUDGET_USD
        value: "1.00"
      - key: AI_BUDGET_NEWS_SHARE
        value: "0.45"
      - key: AI_BUDGET_FILING_SHARE
        value: "0.25"
      - key: AI_BUDGET_DIFF_SHARE
        value: "0.10"
      - key: AI_BUDGET_OVERRIDE_SHARE
        value: "0.10"
      - key: AI_BUDGET_DIGEST_SHARE
        value: "0.10"
      - key: MAX_FILING_SUMMARIES_PER_DAY
        value: "16"
      - key: MAX_NEWS_SUMMARIES_PER_DAY
        value: "38"
      - key: MAX_OVERRIDE_SUMMARIES_PER_DAY
        value: "8"
      - key: MAX_FILING_SUMMARIES_PER_RUN
        value: "3"
      - key: MAX_NEWS_SUMMARIES_PER_RUN
        value: "8"
      - key: MAX_FILING_FULL_AI_PER_DAY
        value: "4"
      - key: MAX_FILING_SHORT_AI_PER_DAY
        value: "12"
      - key: MAX_NEWS_FULL_AI_PER_DAY
        value: "8"
      - key: MAX_NEWS_SHORT_AI_PER_DAY
        value: "30"
      - key: MAX_FILING_DIFFS_PER_DAY
        value: "8"
      - key: MAX_DIGEST_GENERATIONS_PER_DAY
        value: "2"
      - key: COMPANY_IR_TOP_COMPANY_LIMIT
        value: "50"
      - key: CATALYST_LOOKAHEAD_DAYS
        value: "180"
      - key: RECENT_CATALYST_DAYS
        value: "90"
      - key: FILING_SUMMARY_BACKLOG_DAYS
        value: "21"
      - key: NEWS_SUMMARY_BACKLOG_DAYS
        value: "5"
      - key: ENABLE_DAILY_DIGEST
        value: "true"
      - key: DAILY_DIGEST_HOUR
        value: "7"
      - key: SEC_USER_AGENT
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FMP_API_KEY
        sync: false
      - key: FMP_BASE_URL
        value: https://financialmodelingprep.com/stable
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: AACT_DB_HOST
        value: aact-db.ctti-clinicaltrials.org
      - key: AACT_DB_PORT
        value: "5432"
      - key: AACT_DB_NAME
        value: aact
      - key: AACT_DB_USER
        sync: false
      - key: AACT_DB_PASSWORD
        sync: false
      - key: OBJECT_STORE_ENDPOINT_URL
        sync: false
      - key: OBJECT_STORE_ACCESS_KEY_ID
        sync: false
      - key: OBJECT_STORE_SECRET_ACCESS_KEY
        sync: false
      - key: OBJECT_STORE_BUCKET
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_API_TOKEN
        sync: false
      - key: SMTP_PASSWORD
        sync: false

databases:
  - name: life-sciences-intel-db
    plan: basic-256mb
    databaseName: life_sciences_info
    postgresMajorVersion: "16"
