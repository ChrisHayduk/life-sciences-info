version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: life_sciences_info
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/life_sciences_info
      REDIS_URL: redis://redis:6379/0
      OBJECT_STORE_ENDPOINT_URL: http://minio:9000
      OBJECT_STORE_REGION: us-east-1
      LOCAL_ARTIFACT_DIR: /app/data/artifacts
      FRONTEND_BASE_URL: http://localhost:3000
      API_BASE_URL: http://localhost:8000
    depends_on:
      - postgres
      - redis
      - minio
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data

  worker:
    build:
      context: ./backend
    command: dramatiq app.workers
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/life_sciences_info
      REDIS_URL: redis://redis:6379/0
      OBJECT_STORE_ENDPOINT_URL: http://minio:9000
      OBJECT_STORE_REGION: us-east-1
      LOCAL_ARTIFACT_DIR: /app/data/artifacts
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - ./backend/data:/app/data

  scheduler:
    build:
      context: ./backend
    command: python -m app.scheduler
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/life_sciences_info
      OBJECT_STORE_ENDPOINT_URL: http://minio:9000
      OBJECT_STORE_REGION: us-east-1
      LOCAL_ARTIFACT_DIR: /app/data/artifacts
      ENABLE_SCHEDULER: "true"
    depends_on:
      - api
      - minio

  web:
    build:
      context: ./web
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  minio_data:
